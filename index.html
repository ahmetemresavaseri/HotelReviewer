<!DOCTYPE html>
<html lang="de" data-lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Amara Comfort Resort — Über Ihren Aufenthalt</title>
<link rel="icon" type="image/png" href="assets/favicon.png">
<link rel="apple-touch-icon" href="assets/favicon.png">
<link rel="stylesheet" href="assets/brand.css">
<style>
  /* ===== Mobile-first intro / guest details page ===== */
  body{ background:var(--bg-warm); min-height:100vh; display:flex; flex-direction:column; }

  /* --- Hero (dark) with logo + heading --- */
  .hero{
    position:relative;background:var(--dark);color:#fff;
    padding:18px 22px 40px;text-align:center;overflow:hidden;
  }
  .hero::after{
    content:"";position:absolute;inset:0;
    background:radial-gradient(130% 120% at 50% -15%, rgba(170,132,83,.34), transparent 60%);
    pointer-events:none;
  }
  .hero > *{ position:relative;z-index:1; }

  .topbar{ display:flex;justify-content:center;margin-bottom:30px; }
  .lang-switch{ flex-wrap:wrap;justify-content:center; }
  .lang-switch button{ padding:6px 7px;font-size:11px; }

  .hero-logo{ height:62px;width:auto;display:block;margin:0 auto 22px; }
  .hero .tagline{ color:var(--gold-soft);font-size:34px;margin-bottom:2px; }
  .hero h1{ font-weight:300;font-size:29px;color:#fff;letter-spacing:.02em;margin-bottom:14px;line-height:1.15; }
  .hero .intro{ color:rgba(255,255,255,.74);font-size:14.5px;max-width:420px;margin:0 auto;line-height:1.7; }

  /* --- Layout wrap --- */
  .wrap{ max-width:560px;margin:0 auto;width:100%;flex:1;display:flex;flex-direction:column; }

  /* --- Guest details panel --- */
  .panel{ background:#fff;padding:34px 22px 36px;border-bottom:1px solid var(--line); }
  .panel .step{
    display:flex;align-items:center;gap:12px;margin-bottom:8px;
    font-size:11px;letter-spacing:.24em;text-transform:uppercase;color:var(--gold);
  }
  .panel .step::after{ content:"";flex:1;height:1px;background:var(--line); }
  .panel .panel-title{
    font-weight:300;font-size:23px;color:var(--ink);letter-spacing:.01em;
    line-height:1.2;margin-bottom:26px;
  }
  .guest-grid{ display:grid;grid-template-columns:1fr;gap:24px;margin-bottom:28px; }
  .panel textarea.txt{ min-height:120px; }
  .feedback-block{ margin-bottom:30px; }
  .feedback-block .field-label{ margin-bottom:14px; }

  .submit-wrap{ margin-top:4px; }
  .hint{ font-size:12px;color:var(--ink-soft);text-align:center;margin-top:16px;letter-spacing:.02em; }
  .btn-primary.btn-block .arrow{ font-size:15px;letter-spacing:0;transition:transform .25s; }
  .btn-primary.btn-block:hover .arrow{ transform:translateX(4px); }

  /* ===== Tablet / desktop enhancements ===== */
  @media (min-width:600px){
    .hero{ padding:22px 32px 56px; }
    .hero-logo{ height:74px; }
    .hero .tagline{ font-size:40px; }
    .hero h1{ font-size:38px; }
    .wrap{ max-width:640px; }
    .panel{ border:1px solid var(--line);border-top:0;padding:42px 44px 46px;margin-top:-14px;position:relative;z-index:2; }
    .panel-title{ font-size:26px; }
    .guest-grid{ grid-template-columns:1fr 1fr;gap:28px 32px; }
    .guest-grid .full{ grid-column:1 / -1; }
    .submit-wrap{ text-align:center; }
    .btn-primary.btn-block{ width:auto; }
    .amara-footer{ flex-direction:row;text-align:left;justify-content:space-between; }
    .amara-footer .addr{ flex-direction:row;gap:26px; }
  }

  .amara-footer{ flex-direction:column;text-align:center;gap:14px;padding:30px 24px;line-height:1.7;margin-top:auto; }
  .amara-footer .addr{ flex-direction:column;gap:6px;justify-content:center; }
</style>
</head>
<body>

  <section class="hero" data-top>
    <div class="topbar">
      <div class="lang-switch">
        <button data-lang="tr">Türkçe</button><span class="sep">·</span>
        <button data-lang="en">English</button><span class="sep">·</span>
        <button data-lang="de">Deutsch</button><span class="sep">·</span>
        <button data-lang="ru">Русский</button>
      </div>
    </div>
    <img class="hero-logo" src="assets/logo-white.png" alt="Amara Comfort Resort">
    <div class="tagline">it's your world!</div>
    <h1 data-i18n="heading">Ihre Erfahrung</h1>
    <p class="intro" data-i18n="start_intro">Bevor Sie Ihren Aufenthalt bewerten, erzählen Sie uns bitte kurz etwas über sich.</p>
  </section>

  <main class="wrap">
    <form class="intro-form panel" novalidate>
      <div class="step"><span data-i18n="guest_title">Über Ihren Aufenthalt</span></div>
      <h2 class="panel-title" data-i18n="guest_title">Über Ihren Aufenthalt</h2>

      <div class="guest-grid">
        <div>
          <label class="field-label" data-i18n="f_name">Name</label>
          <input class="txt" type="text" name="name" required data-i18n-ph="ph_name">
        </div>
        <div>
          <label class="field-label" data-i18n="f_room">Zimmernummer</label>
          <input class="txt" type="text" name="room" inputmode="numeric" data-i18n-ph="ph_room">
        </div>
        <div class="full">
          <label class="field-label" data-i18n="f_birthyear">Geburtsjahr</label>
          <input class="txt" type="number" name="birthyear" inputmode="numeric" min="1900" max="2026" data-i18n-ph="ph_birthyear">
        </div>
      </div>

      <div class="submit-wrap">
        <button type="submit" class="btn-primary btn-block">
          <span data-i18n="intro_continue">Weiter zur Bewertung</span>
          <span class="arrow">→</span>
        </button>
      </div>
    </form>
  </main>

  <footer class="amara-footer">
    <div class="addr">
      <span>Cumhuriyet Mah. Ahu Ünal Aysal Cd. No:33, Kemer / Antalya</span>
      <a href="tel:+902425245795">+90 242 524 57 95</a>
    </div>
    <span>© 2026 Amara Comfort Resort</span>
  </footer>

  <script src="assets/review.js"></script>
</body>
</html>
